<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Deras Download Manager</title>
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      color: #333;
      background-color: #f9fafb;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header img {
      width: 32px;
      height: 32px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      color: #111827;
    }
    .status-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .status-header {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #9ca3af;
    }
    .dot.connected {
      background-color: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
    }
    .dot.disconnected {
      background-color: #ef4444;
    }
    
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .toggle-label {
      font-size: 14px;
      font-weight: 500;
    }
    
    /* Toggle switch CSS */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 24px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2563eb;
    }
    input:checked + .slider:before {
      transform: translateX(16px);
    }
    
    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="Logo" id="logo">
    <h1>Deras Companion</h1>
  </div>

  <div class="status-card">
    <div class="status-header">Desktop App Connection</div>
    <div class="status-indicator">
      <div class="dot disconnected" id="conn-dot"></div>
      <span id="conn-text">Checking...</span>
    </div>
    <div id="conn-help" style="font-size: 11px; color: #6b7280; margin-top: 6px; display: none;">
      Ensure Deras is running on port 4142.
    </div>
  </div>

  <div class="toggle-container">
    <span class="toggle-label">Intercept Downloads</span>
    <label class="switch">
      <input type="checkbox" id="intercept-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">
    Right-click any link to download via Deras.
  </div>

  <script src="popup.js"></script>
</body>
</html>
